services:

  # ── Flask web app ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "5001:5000"
    volumes:
      # Source code — mounted so code changes take effect on container restart (no rebuild)
      - .:/app
      # Named volume for Manim workspace — avoids Windows NTFS bind-mount permission issues
      - manim_workspace:/app/output/manim_workspace
      # Docker socket — lets the app spawn Manim rendering containers on the host
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      # Volume name used by manim_runner when spawning Manim containers
      - MANIM_WORKSPACE_VOLUME=autonomous-multi-agent-system-for-scientific-animation_manim_workspace
    restart: unless-stopped
    depends_on:
      manim:
        condition: service_completed_successfully

  # ── Manim rendering image (build-only, exits immediately after build) ─────
  manim:
    build:
      context: .
      dockerfile: Dockerfile.manim
    image: manim-science-animation
    command: ["echo", "manim image ready"]
    restart: "no"

volumes:
  manim_workspace:
